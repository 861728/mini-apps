<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>알바 급여 계산기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f8f7f5; font-family: sans-serif; color: #1a1917; padding: 3rem 1.5rem; }
  .wrap { max-width: 600px; margin: 0 auto; }
  .back { font-size: 13px; color: #999; text-decoration: none; display: inline-block; margin-bottom: 2rem; }
  .back:hover { color: #1a1917; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 6px; }
  .sub { font-size: 14px; color: #888; margin-bottom: 2rem; }

  .section { margin-bottom: 1.5rem; }
  .section-title { font-size: 12px; color: #aaa; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 10px; }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
  .field input, .field select {
    width: 100%; padding: 9px 12px; font-size: 14px;
    border: 1px solid #ddd; border-radius: 8px;
    background: #fff; color: #1a1917;
  }
  .field input:focus, .field select:focus { outline: none; border-color: #aaa; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* 요일 버튼 */
  .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 8px; }
  .day-btn {
    padding: 8px 4px; font-size: 12px; text-align: center;
    border: 1px solid #ddd; border-radius: 6px; background: #fff;
    cursor: pointer; color: #888; user-select: none; transition: all .1s;
  }
  .day-btn.active      { background: #1a1917; color: #fff; border-color: #1a1917; }
  .day-btn.sun         { color: #c0392b; }
  .day-btn.sat         { color: #2471a3; }
  .day-btn.sun.active  { background: #c0392b; border-color: #c0392b; color: #fff; }
  .day-btn.sat.active  { background: #2471a3; border-color: #2471a3; color: #fff; }
  .days-hint { font-size: 11px; color: #bbb; margin-top: 6px; }

  /* 범위 안내 */

  .btn-primary {
    width: 100%; padding: 12px; font-size: 15px;
    background: #1a1917; color: #fff;
    border: none; border-radius: 8px; cursor: pointer; margin-top: 8px;
  }
  .btn-primary:hover { opacity: 0.85; }

  hr { border: none; border-top: 1px solid #eee; margin: 1.5rem 0; }

  .result { display: none; }
  .result-box {
    background: #fff; border: 1px solid #eee; border-radius: 12px;
    padding: 1.25rem 1.5rem; margin-bottom: 12px;
  }
  .result-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 7px 0; border-bottom: 1px solid #f5f5f5; font-size: 14px;
  }
  .result-row:last-child { border-bottom: none; }
  .result-row .lbl { color: #888; }
  .result-row .val { font-weight: 500; color: #1a1917; }
  .result-divider {
    font-size: 11px; color: #ccc; letter-spacing: 0.05em;
    text-transform: uppercase; padding: 10px 0 4px;
  }
  .result-total {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 12px 0 0;
  }
  .result-total .lbl { font-size: 15px; font-weight: 500; }
  .result-total .val { font-size: 22px; font-weight: 600; color: #1a1917; }

  .badge-warn { font-size: 12px; background: #fff3cd; color: #7d5a00; padding: 4px 10px; border-radius: 6px; display: inline-block; }
  .badge-ok   { font-size: 12px; background: #d8f3dc; color: #2d6a4f; padding: 4px 10px; border-radius: 6px; display: inline-block; }
  .law-note { font-size: 12px; color: #aaa; line-height: 1.8; margin-top: 12px; }

  .break-warn {
    font-size: 12px; background: #fde8e8; color: #a32d2d;
    border: 1px solid #f5c0c0; border-radius: 6px;
    padding: 8px 12px; margin-top: 8px; display: none;
  }
  .break-warn.show { display: block; }
</style>
</head>
<body>
<div class="wrap">
  <a href="myapps.html" class="back">← 목록으로</a>
  <h1>알바 급여 계산기</h1>
  <p class="sub">주휴수당·연장수당·휴일수당 포함 급여를 계산해드려요 <span style="color:#bbb; font-weight:400;">(시급제 알바 · 자영업자 · 소상공인 대상)</span></p>

  <!-- 기본 정보 -->
  <div class="section">
    <div class="section-title">기본 정보</div>
    <div class="row2">
      <div class="field">
        <label>시급 (원)</label>
        <input type="number" id="hourlyWage" value="10320" min="1" step="10" />
      </div>
      <div class="field">
        <label>사업장 규모</label>
        <select id="bizSize" onchange="onBizSizeChange()">
          
          <option value="under5" selected>5인 미만</option>
          <option value="over5">5인 이상</option>
        </select>
      </div>
    </div>

    <!-- 5인 이상 안내 -->
    <div id="over5Notice" style="display:none; background:#fff8ec; border:1px solid #f0d080; border-radius:8px; padding:9px 12px; font-size:12px; color:#7d5a00; line-height:1.6; margin-top:6px;">
      5인 이상은 가산수당 조합이 복잡해 오차가 생길 수 있습니다.<br>정확한 금액은 고용노동부 ☎ 1350 또는 노무사 상담을 권장합니다.
    </div>

    <div class="field">
      <label>계산 기간</label>
      <select id="period">
        <option value="week">1주일</option>
        <option value="month">1개월 (4주 기준)</option>
      </select>
    </div>
  </div>

  <!-- 근무 요일 -->
  <div class="section">
    <div class="section-title">근무 요일</div>
    <div class="days-grid">
      <div class="day-btn sun" data-day="0" onclick="toggleDay(this)">일</div>
      <div class="day-btn active" data-day="1" onclick="toggleDay(this)">월</div>
      <div class="day-btn active" data-day="2" onclick="toggleDay(this)">화</div>
      <div class="day-btn active" data-day="3" onclick="toggleDay(this)">수</div>
      <div class="day-btn active" data-day="4" onclick="toggleDay(this)">목</div>
      <div class="day-btn active" data-day="5" onclick="toggleDay(this)">금</div>
      <div class="day-btn sat" data-day="6" onclick="toggleDay(this)">토</div>
    </div>
    <div class="days-hint">토·일은 휴일로 처리됩니다 — 5인 이상: 휴일수당 자동 적용 / 5인 미만: 기본 시급만</div>
  </div>

  <!-- 근무 시간 -->
  <div class="section">
    <div class="section-title">근무 시간</div>
    <div class="row2">
      <div class="field">
        <label>출근 시간</label>
        <input type="time" id="startTime" value="09:00" onchange="checkBreak()" />
      </div>
      <div class="field">
        <label>퇴근 시간</label>
        <input type="time" id="endTime" value="18:00" onchange="checkBreak()" />
      </div>
    </div>
    <div class="field">
      <label>하루 휴게 시간</label>
      <select id="breakTime" onchange="checkBreak()">
        <option value="0">없음</option>
        <option value="30">30분</option>
        <option value="60" selected>1시간</option>
        <option value="90">1시간 30분</option>
      </select>
      <div class="break-warn" id="breakWarn"></div>
    </div>
  </div>

  <button class="btn-primary" onclick="calculate()">급여 계산하기</button>

  <div class="result" id="result">
    <hr>
    <div class="result-box" id="resultBox"></div>
    <div class="law-note" id="lawNote"></div>
  </div>
</div>

<script>
const MIN_WAGE = 10320; // 2026년 최저시급

// 일=0, 토=6 → 휴일. 나머지는 평일.
const HOLIDAY_DAYS = new Set([0, 6]);

let activeDays = new Set([1, 2, 3, 4, 5]);

function toggleDay(el) {
  const day = parseInt(el.dataset.day);
  if (activeDays.has(day)) {
    if (activeDays.size === 1) return; // 최소 1일 유지
    activeDays.delete(day);
    el.classList.remove('active');
  } else {
    activeDays.add(day);
    el.classList.add('active');
  }
}

function fmt(n) {
  return Math.round(n).toLocaleString('ko-KR') + '원';
}

function timeToMin(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

// 휴게시간 법적 최소치 (근로기준법 제54조)
function checkBreak() {
  const total = timeToMin(document.getElementById('endTime').value)
              - timeToMin(document.getElementById('startTime').value);
  const br = parseInt(document.getElementById('breakTime').value);
  const el = document.getElementById('breakWarn');
  let msg = '';
  if (total > 480 && br < 60)      msg = '⚠ 근로기준법 제54조: 8시간 초과 시 휴게 1시간 이상 의무';
  else if (total > 240 && br < 30) msg = '⚠ 근로기준법 제54조: 4시간 초과 시 휴게 30분 이상 의무';
  el.textContent = msg;
  el.classList.toggle('show', !!msg);
}

function calculate() {
  const wage    = parseInt(document.getElementById('hourlyWage').value) || MIN_WAGE;
  const isOver5 = document.getElementById('bizSize').value === 'over5';
  const period  = document.getElementById('period').value;
  const startM  = timeToMin(document.getElementById('startTime').value);
  const endM    = timeToMin(document.getElementById('endTime').value);
  const breakM  = parseInt(document.getElementById('breakTime').value);

  if (activeDays.size === 0) { alert('근무 요일을 선택해주세요'); return; }

  const workMin = endM - startM - breakM;
  if (workMin <= 0) { alert('근무 시간을 확인해주세요'); return; }
  const workH = workMin / 60;

  // 선택 요일을 평일 / 휴일로 분리
  let weekdayCount  = 0; // 월~금
  let holidayCount  = 0; // 토·일
  activeDays.forEach(d => {
    if (HOLIDAY_DAYS.has(d)) holidayCount++;
    else weekdayCount++;
  });

  const totalDays = activeDays.size;

  // ── 평일 계산 ──
  // 기본급: min(workH, 8) × wage
  // 연장: max(0, workH-8) × wage × 1.5 (5인 이상) 또는 × 1.0 (5인 미만)
  const weekdayRegH  = Math.min(workH, 8);
  const weekdayOvtH  = Math.max(0, workH - 8);
  const weekdayBasic = weekdayRegH * wage * weekdayCount;
  const weekdayOvt   = isOver5
    ? weekdayOvtH * wage * 1.5 * weekdayCount   // 가산 포함 1.5배
    : weekdayOvtH * wage * 1.0 * weekdayCount;  // 5인 미만: 기본 시급만

  // ── 휴일 계산 (근로기준법 제56조 제2항) ──
  // 5인 이상: 8h 이내 × 1.5 / 8h 초과 × 2.0
  // 5인 미만: 가산 없이 기본 시급만 (× 1.0)
  const holWithin8 = Math.min(workH, 8);
  const holOver8   = Math.max(0, workH - 8);

  let holidayPay = 0;
  if (isOver5) {
    holidayPay = (holWithin8 * wage * 1.5 + holOver8 * wage * 2.0) * holidayCount;
  } else {
    holidayPay = workH * wage * holidayCount;
  }

  // ── 주휴수당 ──
  // 산정 기준: 평일 소정근로시간만 (휴일근로는 소정근로 아님)
  // 조건: 주 소정근로시간 15시간 이상 + 개근 가정
  // 공식: min(주소정근로시간 / 40, 1) × 8 × 시급  (근로기준법 제55조, 시행령 제30조)
  const weeklyH   = workH * weekdayCount; // 평일만
  const weeklyPay = weeklyH >= 15
    ? Math.min(weeklyH / 40, 1) * 8 * wage
    : 0;

  const weekdayTotal = weekdayBasic + weekdayOvt;
  const weekTotal    = weekdayTotal + holidayPay + weeklyPay;
  const multiplier   = period === 'month' ? 4 : 1;
  const total        = weekTotal * multiplier;
  const pLabel       = period === 'month' ? '월 (4주 기준)' : '주';

  // ── 결과 출력 ──
  let rows = '';

  // 평일
  if (weekdayCount > 0) {
    rows += `<div class="result-divider">평일 (${weekdayCount}일)</div>`;
    rows += `<div class="result-row">
      <span class="lbl">기본급 (${weekdayCount}일 × ${weekdayRegH.toFixed(1)}h × ${wage.toLocaleString()}원)</span>
      <span class="val">${fmt(weekdayBasic * multiplier)}</span>
    </div>`;
    if (weekdayOvtH > 0) {
      rows += isOver5
        ? `<div class="result-row">
            <span class="lbl">연장수당 (${weekdayCount}일 × ${weekdayOvtH.toFixed(1)}h × 1.5배)</span>
            <span class="val">+${fmt(weekdayOvt * multiplier)}</span>
          </div>`
        : `<div class="result-row">
            <span class="lbl">연장 ${weekdayOvtH.toFixed(1)}h — 5인 미만, 기본 시급만</span>
            <span class="val">${fmt(weekdayOvt * multiplier)}</span>
          </div>`;
    }
  }

  // 휴일 (토·일)
  if (holidayCount > 0) {
    rows += `<div class="result-divider">휴일 (${holidayCount}일 — 토·일)</div>`;
    if (isOver5) {
      const label = holOver8 > 0
        ? `휴일수당 (8h 이내 ×1.5 / ${holOver8.toFixed(1)}h 초과 ×2.0)`
        : `휴일수당 (${holidayCount}일 × ${workH.toFixed(1)}h × 1.5배)`;
      rows += `<div class="result-row">
        <span class="lbl">${label}</span>
        <span class="val">${fmt(holidayPay * multiplier)}</span>
      </div>`;
    } else {
      rows += `<div class="result-row">
        <span class="lbl">휴일근무 ${holidayCount}일 — 5인 미만, 기본 시급만</span>
        <span class="val">${fmt(holidayPay * multiplier)}</span>
      </div>`;
    }
  }

  // 주휴수당
  rows += `<div class="result-divider">주휴수당</div>`;
  if (weeklyH >= 15) {
    rows += `<div class="result-row">
      <span class="lbl">주휴수당 (평일 주 ${weeklyH.toFixed(1)}h · 개근 가정)</span>
      <span class="val">+${fmt(weeklyPay * multiplier)}</span>
    </div>`;
  } else if (weekdayCount === 0) {
    rows += `<div class="result-row">
      <span class="lbl">주휴수당</span>
      <span class="val" style="color:#bbb">평일 소정근로 없음 — 미해당</span>
    </div>`;
  } else {
    rows += `<div class="result-row">
      <span class="lbl">주휴수당</span>
      <span class="val" style="color:#bbb">평일 주 ${weeklyH.toFixed(1)}h — 15시간 미만, 미해당</span>
    </div>`;
  }

  // 합계
  rows += `<div style="border-top:1px solid #eee;margin-top:8px;padding-top:8px;">
    <div class="result-total">
      <span class="lbl">${pLabel} 총 급여</span>
      <span class="val">${fmt(total)}</span>
    </div>
  </div>`;

  document.getElementById('resultBox').innerHTML = rows;

  // ── 법적 안내 ──
  let notes = [];

  notes.push(wage < MIN_WAGE
    ? `<span class="badge-warn">⚠ 입력 시급 ${wage.toLocaleString()}원 — 2026년 최저시급(${MIN_WAGE.toLocaleString()}원) 미달, 최저임금법 위반</span>`
    : `<span class="badge-ok">✓ 2026년 최저시급 ${MIN_WAGE.toLocaleString()}원 충족</span>`
  );

  notes.push(`<br><br>📌 주휴수당: 평일 소정근로시간 기준, 주 15시간 이상 개근 시 지급 의무 (근로기준법 제55조, 시행령 제30조). 본 계산기는 개근을 가정합니다.`);

  if (isOver5) {
    if (weekdayOvtH > 0) {
      notes.push(`<br>📌 연장근로 (1일 8시간 초과): 통상임금 50% 가산 (근로기준법 제56조 제1항)`);
    }
    if (holidayCount > 0) {
      notes.push(`<br>📌 휴일근로: 8시간 이내 50% 가산(×1.5) / 8시간 초과 100% 가산(×2.0) (근로기준법 제56조 제2항)`);
    }
  } else {
    notes.push(`<br>📌 5인 미만 사업장: 연장·야간·휴일 가산수당 의무 없음. 실근무 시간에 대해 기본 시급만 지급 (근로기준법 제11조 제2항)`);
  }

  notes.push(`<br>📌 1개월은 실제 4.345주이나 본 계산기는 4주 기준으로 산출합니다.`);
  notes.push(`<br><br>⚠ 야간근로(22시 이후) · 불규칙 근무는 이 계산기에 포함되지 않습니다. 고용노동부 ☎ 1350 또는 노무사 상담을 권장합니다.`);

  document.getElementById('lawNote').innerHTML = notes.join('');
  document.getElementById('result').style.display = 'block';
  document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
}


function onBizSizeChange() {
  const isOver5 = document.getElementById('bizSize').value === 'over5';
  document.getElementById('over5Notice').style.display = isOver5 ? 'block' : 'none';
}

checkBreak();
</script>
</body>
</html>
